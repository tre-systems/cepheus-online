name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify
        run: npm run verify

      - name: Validate Cloudflare deploy bundle
        run: npm run deploy:dry-run

      - name: Validate production Cloudflare deploy bundle
        run: |
          npm run build:client
          npx wrangler deploy --dry-run \
            --route 'cepheus.tre.systems/*' \
            --var APP_BASE_URL:https://cepheus.tre.systems \
            --var DISCORD_CLIENT_ID:set-with-wrangler-secret-or-env

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }

      - name: Resolve Cloudflare D1 database ids
        id: resolve-d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/resolve-cloudflare-d1-database-id.mjs --create-missing

      - name: Skip deploy until Cloudflare D1 database exists
        if: steps.resolve-d1.outputs.ready != 'true'
        run: |
          echo "::warning::Verified the build and Worker dry run, but skipped deployment because the Cloudflare D1 database named in wrangler.jsonc does not exist yet."

      - name: Apply Cloudflare D1 migrations
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply cepheus-online-private-beta --remote

      - name: Release production Worker route
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node scripts/release-cloudflare-worker-route.mjs \
            --zone tre.systems \
            --pattern 'cepheus.tre.systems/*' \
            --keep-script cepheus-online

      - name: Deploy to Cloudflare Workers
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run build:client
          npx wrangler deploy \
            --route 'cepheus.tre.systems/*' \
            --var APP_BASE_URL:https://cepheus.tre.systems \
            --var DISCORD_CLIENT_ID:set-with-wrangler-secret-or-env
