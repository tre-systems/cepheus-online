name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Quick checks
        run: npm run verify:quick

      - name: Unit tests
        run: npm test

  e2e-character-creation:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Character creation E2E shard ${{ matrix.shard }}/4
        run: npx playwright test e2e/character-creation-smoke.spec.ts --shard=${{ matrix.shard }}/4

  e2e-table:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Tactical board E2E
        run: npm run test:e2e:tactical

      - name: Private-beta E2E
        run: npm run test:e2e:private-beta

  deploy-dry-run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate Cloudflare deploy bundle
        run: npm run deploy:dry-run

      - name: Validate production Cloudflare deploy bundle
        run: |
          npm run build:client
          npx wrangler deploy --dry-run \
            --route 'cepheus.tre.systems/*' \
            --var APP_BASE_URL:https://cepheus.tre.systems \
            --var DISCORD_CLIENT_ID:set-with-wrangler-secret-or-env

  deploy:
    needs: [quick, e2e-character-creation, e2e-table, deploy-dry-run]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$SESSION_SECRET" || { echo "Missing SESSION_SECRET"; exit 1; }

      - name: Resolve Cloudflare D1 database ids
        id: resolve-d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/resolve-cloudflare-d1-database-id.mjs --create-missing

      - name: Skip deploy until Cloudflare D1 database exists
        if: steps.resolve-d1.outputs.ready != 'true'
        run: |
          echo "::warning::Verified the build and Worker dry run, but skipped deployment because the Cloudflare D1 database named in wrangler.jsonc does not exist yet."

      - name: Apply Cloudflare D1 migrations
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply cepheus-online-private-beta --remote

      - name: Release production Worker route
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node scripts/release-cloudflare-worker-route.mjs \
            --zone tre.systems \
            --pattern 'cepheus.tre.systems/*' \
            --keep-script cepheus-online

      - name: Configure Worker secrets
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
        run: |
          printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
          if [ -n "$DISCORD_CLIENT_SECRET" ]; then
            printf '%s' "$DISCORD_CLIENT_SECRET" | npx wrangler secret put DISCORD_CLIENT_SECRET
          else
            echo "::warning::DISCORD_CLIENT_SECRET is not set; Discord OAuth remains disabled until configured."
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.resolve-d1.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_CLIENT_ID_VAR: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_ID_SECRET: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          DISCORD_CLIENT_ID_VALUE="${DISCORD_CLIENT_ID_VAR:-${DISCORD_CLIENT_ID_SECRET:-set-with-wrangler-secret-or-env}}"
          npm run build:client
          npx wrangler deploy \
            --route 'cepheus.tre.systems/*' \
            --var APP_BASE_URL:https://cepheus.tre.systems \
            --var DISCORD_CLIENT_ID:"$DISCORD_CLIENT_ID_VALUE"
